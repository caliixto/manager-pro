<div class="calendario-page">

  <div class="calendario-header">
    <h1>Calendario de Partidos</h1>
  </div>

  <div class="calendario-nav">
    <button class="nav-btn" (click)="mesAnterior()">‹</button>
    <span class="mes-nombre">{{ nombreMesActual() }}</span>
    <button class="nav-btn" (click)="mesSiguiente()">›</button>
  </div>

  <div class="calendar-grid" *ngIf="!loading()">
    
    <!-- Cabecera con los días de la semana -->
    <div class="calendar-grid__weekday" *ngFor="let dia of diasSemana">{{ dia }}</div>

    <!-- Las semanas, cada una con 7 días -->
    <ng-container *ngFor="let semana of semanasDelMes">
      <div 
        class="calendar-day" 
        *ngFor="let dia of semana"
        [class.calendar-day--empty]="!dia.numero">
        
        <span class="calendar-day__number" *ngIf="dia.numero">{{ dia.numero }}</span>

        <div class="calendar-day__match" *ngIf="dia.partido as partido">
          <div class="match-shield">
            <i class="pi pi-shield"></i>
          </div>
          <span class="match-rival">{{ partido.rival }}</span>
          <span 
            class="match-result" 
            [class]="getResultadoClase(partido)"
            *ngIf="partido.jugado">
            {{ getResultadoTexto(partido) }}
          </span>
          <span class="match-pending" *ngIf="!partido.jugado">Pendiente</span>
        </div>

      </div>
    </ng-container>

  </div>

  <p *ngIf="loading()" class="loading-state">Cargando calendario...</p>
  <p *ngIf="errorMsg()" class="error-msg">{{ errorMsg() }}</p>

</div>
